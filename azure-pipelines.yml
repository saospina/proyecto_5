# CI/CD: build -> test -> push image to ACR -> deploy to Azure Container Apps
trigger:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  # ---- Adjust these to your Azure resources ----
  acrName: 'myacrproyecto5'                # ACR name (without .azurecr.io)
  acrLoginServer: '$(acrName).azurecr.io'
  imageName: 'my-backend'
  containerAppName: 'my-backend'
  resourceGroup: 'rg-proyecto5'
  # Service connections created in Azure DevOps (Project settings > Service connections)
  dockerServiceConnection: 'acr-service-connection'    # type: Docker Registry -> ACR
  azureServiceConnection: 'azure-service-connection'   # type: Azure Resource Manager
  tag: '$(Build.BuildId)'

stages:
  - stage: Test
    displayName: 'Unit and integration tests'
    jobs:
      - job: test
        displayName: 'npm test'
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '20.x'
            displayName: 'Use Node.js 20'

          # Ephemeral PostgreSQL for the integration tests
          - script: |
              docker run -d --name test-db -p 5432:5432 \
                -e POSTGRES_USER=postgres \
                -e POSTGRES_PASSWORD=postgres \
                -e POSTGRES_DB=usersdb \
                postgres:16-alpine
              until docker exec test-db pg_isready -U postgres -d usersdb; do sleep 1; done
            displayName: 'Start PostgreSQL for tests'

          - script: npm ci
            displayName: 'Install dependencies'

          - script: npm test
            displayName: 'Run unit and integration tests'
            env:
              DATABASE_URL: 'postgres://postgres:postgres@localhost:5432/usersdb'

  - stage: Build
    displayName: 'Build and push image to ACR'
    dependsOn: Test
    condition: succeeded()
    jobs:
      - job: build_push
        displayName: 'docker build & push'
        steps:
          - task: Docker@2
            displayName: 'Build and push to ACR'
            inputs:
              command: buildAndPush
              containerRegistry: '$(dockerServiceConnection)'
              repository: '$(imageName)'
              dockerfile: 'Dockerfile'
              tags: |
                $(tag)
                latest

  - stage: Deploy
    displayName: 'Deploy to Azure Container Apps'
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: deploy
        displayName: 'az containerapp update'
        steps:
          - task: AzureCLI@2
            displayName: 'Update Container App image'
            inputs:
              azureSubscription: '$(azureServiceConnection)'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az containerapp update \
                  --name $(containerAppName) \
                  --resource-group $(resourceGroup) \
                  --image $(acrLoginServer)/$(imageName):$(tag)
